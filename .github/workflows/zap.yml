name: OWASP ZAP Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  zap-scan:
    runs-on: ubuntu-latest
    name: Escaneo de Seguridad Dinámico (DAST)

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependencias
        run: npm install

      - name: Construir la aplicación
        run: npm run build

      - name: Levantar servidor de previsualización
        run: nohup npm run preview -- --port 4173 --host > app.log 2>&1 &

      - name: Esperar a que la aplicación esté lista
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4173 >/dev/null 2>&1; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          tail -n 50 app.log || true
          exit 1

      - name: Preparar directorio de reportes ZAP
        run: mkdir -p ${{ github.workspace }}/zap-reports && chmod 777 ${{ github.workspace }}/zap-reports

      - name: Ejecutar OWASP ZAP Baseline Scan
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/zap-reports:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:4173 \
            -r report.html \
            -w report.md \
            -J report.json \
            -I
        continue-on-error: true

      - name: Verificar archivos de reporte
        if: always()
        run: ls -la ${{ github.workspace }}/zap-reports || true

      - name: Subir reporte ZAP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: ${{ github.workspace }}/zap-reports/
          if-no-files-found: warn
